<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComeCome - Hamburguesería</title>
  <!-- Favicon para la pestaña del navegador -->
  <link rel="icon" type="image/png" href="pacman-icon.png">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <!-- Tipografías -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --amarillo: #FCE029;
      --amarillo-hover: #FFD400;
      --amarillo-oscuro: #e6c800;
      --negro: #141414;
      --gris-texto: #6B6B6B;
      --borde-suave: rgba(0,0,0,0.08);
      --sombra-card: 0 3px 10px rgba(0,0,0,0.08);
      --sombra-card-hover: 0 14px 28px rgba(0,0,0,0.16);
      --gradiente-cta: linear-gradient(135deg, var(--amarillo), var(--amarillo-hover));
    }

    * { -webkit-tap-highlight-color: transparent; }

    body {
      background-color: #FFFCF5;
      font-family: 'Inter', sans-serif;
      color: #222;
    }

    h1, h2, h3, .navbar-brand, .btn-categoria, .card-title, .fw-bold.fs-5, .offcanvas-title, .precio-pill {
      font-family: 'Poppins', sans-serif;
    }

    ::selection { background: var(--amarillo); color: var(--negro); }

    a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: 3px solid var(--amarillo);
      outline-offset: 2px;
    }

    .navbar, .footer { background-color: var(--negro); }
    .navbar-brand, .nav-link, .btn-carrito { color: var(--amarillo) !important; }
    .navbar-brand { font-weight: 800; font-size: 1.35rem; letter-spacing: 0.2px; }

    .btn-amarillo {
      background: var(--gradiente-cta); color: var(--negro);
      border: none; font-weight: 700; font-family: 'Poppins', sans-serif;
      border-radius: 2rem; box-shadow: 0 6px 16px rgba(252,224,41,0.45);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .btn-amarillo:hover { transform: translateY(-2px); box-shadow: 0 10px 22px rgba(252,224,41,0.55); }
    .btn-amarillo:active { transform: translateY(0); }
    .btn-amarillo:disabled { opacity: 0.45; box-shadow: none; transform: none; }

    /* Tarjetas de producto */
    .card-producto {
      position: relative;
      border: none; border-radius: 1.1rem;
      box-shadow: var(--sombra-card); background: #fff;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card-producto:hover { transform: translateY(-4px); box-shadow: var(--sombra-card-hover); }

    .producto-media { position: relative; }
    .producto-media img, .producto-media .producto-sin-foto {
      border-radius: 1.1rem 1.1rem 0 0;
    }
    .card-producto .card-img-top { aspect-ratio: 4/3; object-fit: cover; display: block; }
    .producto-sin-foto {
      width: 100%; aspect-ratio: 4/3; background-color: var(--negro);
      color: var(--amarillo);
      display: flex; align-items: center; justify-content: center; font-size: 2.6rem;
    }

    .card-body { padding-top: 1.7rem; border-radius: 0 0 1.1rem 1.1rem; }

    .btn-add-flotante {
      position: absolute; right: 14px; bottom: -18px; z-index: 3;
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--gradiente-cta); color: var(--negro); border: 3px solid #fff;
      display: flex; align-items: center; justify-content: center; font-size: 1.25rem;
      box-shadow: 0 6px 14px rgba(252,224,41,0.55);
      transition: transform 0.15s ease;
    }
    .btn-add-flotante:hover { transform: scale(1.12) rotate(8deg); }
    .btn-add-flotante:active { transform: scale(0.92); }
    .btn-add-flotante:disabled { background: #bdbdbd; box-shadow: none; }

    .precio-pill {
      background: var(--amarillo); color: var(--negro); font-weight: 800;
      border-radius: 2rem; padding: 0.3rem 0.85rem; font-size: 1.05rem; display: inline-block;
    }

    .badge-oferta {
      position: absolute; top: 10px; left: 10px; z-index: 2;
      background: var(--gradiente-cta); color: var(--negro); font-weight: 700;
      border-radius: 2rem; padding: 0.3rem 0.7rem; font-size: 0.78rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .offcanvas-header, .offcanvas-footer { background-color: var(--negro); color: var(--amarillo); }
    .offcanvas-body { background-color: #FFFCF5; }

    .toast {
      background-color: var(--negro); color: #fff;
      border: 1px solid var(--amarillo); border-radius: 0.8rem;
    }
    .toast i.bi-check-circle-fill { color: var(--amarillo); }
    .toast .btn-close { filter: invert(1); }
    .toast .toast-body { font-size: 0.9rem; line-height: 1.3; }
    .error-message { display: none; }

    /* Barra de categorías */
    .categorias-nav {
      background-color: var(--negro); padding: 0.6rem 0;
      position: sticky; top: 56px; z-index: 1020;
      overflow-x: auto; white-space: nowrap;
      -webkit-overflow-scrolling: touch; scrollbar-width: none; -ms-overflow-style: none;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .categorias-nav::-webkit-scrollbar { display: none; }
    .categorias-nav .container { display: flex; flex-wrap: nowrap; padding: 0 1rem; gap: 0.4rem; }
    .btn-categoria {
      display: inline-block; background: transparent; color: #cfcfcf;
      border: 1px solid rgba(255,255,255,0.15); border-radius: 2rem;
      padding: 0.4rem 1rem; margin: 0; font-weight: 600; font-size: 0.88rem;
      transition: all 0.2s ease; white-space: nowrap; text-decoration: none;
    }
    .btn-categoria:hover { color: #fff; border-color: rgba(255,255,255,0.4); }
    .btn-categoria.active {
      background: var(--gradiente-cta); color: var(--negro); border-color: transparent;
      box-shadow: 0 4px 12px rgba(252,224,41,0.5);
    }

    /* Icono junto al título */
    .icono-titulo {
      background: var(--gradiente-cta); color: var(--negro);
      width: 38px; height: 38px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.1rem; box-shadow: 0 4px 10px rgba(252,224,41,0.45);
    }

    /* Mapa del punto de recogida */
    .recogida-mapa-wrap { border-radius: 0.8rem; overflow: hidden; border: 2px solid var(--amarillo); }
    .recogida-mapa-wrap iframe { width: 100%; height: 190px; display: block; border: 0; }
    .recogida-info { font-size: 0.85rem; color: var(--gris-texto); margin-top: 0.5rem; }
    .btn-como-llegar {
      font-size: 0.78rem; border-radius: 2rem;
      color: var(--negro); border-color: var(--amarillo);
      background: transparent;
    }
    .btn-como-llegar:hover { background-color: var(--amarillo); border-color: var(--amarillo); color: var(--negro); }

    /* Carrito: stepper de cantidad */
    .carrito-item { border: none !important; border-bottom: 1px solid var(--borde-suave) !important; padding: 0.9rem 0.25rem; }
    .stepper { display: flex; align-items: center; gap: 0.6rem; }
    .stepper button {
      width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--borde-suave);
      background: #fff; display: flex; align-items: center; justify-content: center; line-height: 1;
      transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }
    .stepper button:hover { background: var(--gradiente-cta); color: var(--negro); border-color: transparent; }
    .stepper span { min-width: 1.2rem; text-align: center; font-weight: 600; }

    #cart-count { background-color: var(--amarillo) !important; color: var(--negro) !important; }
    #cart-count.bump { animation: bump 0.3s ease; }
    @keyframes bump { 0% { transform: scale(1); } 40% { transform: scale(1.4); } 100% { transform: scale(1); } }

    .carrito-vacio { text-align: center; padding: 2.5rem 1rem; color: var(--gris-texto); }
    .carrito-vacio i { font-size: 2.4rem; color: var(--amarillo); }

    #total-pedido { color: var(--negro); font-size: 1.15rem; }

    /* Skeletons de carga */
    .skeleton {
      background: linear-gradient(90deg, #ececec 25%, #f6f6f6 50%, #ececec 75%);
      background-size: 200% 100%; animation: skeleton-pulse 1.4s ease-in-out infinite;
      border-radius: 0.6rem;
    }
    @keyframes skeleton-pulse { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-card { height: 270px; border-radius: 1rem; }
    .skeleton-chip { height: 32px; width: 84px; border-radius: 2rem; display: inline-block; margin-right: 0.4rem; flex: none; }

    @media (max-width: 280px) {
      .toast .toast-body { font-size: 0.8rem; padding: 0.5rem; }
      .toast .btn-close { font-size: 0.7rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    /* Toast centrado y autoajustable */
    .toast-container { display: flex; justify-content: center; left: 0; right: 0; pointer-events: none; }
    .toast { max-width: 90vw; margin: 0 auto; pointer-events: auto; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center" href="#">
        <img src="pacman-icon.png" alt="ComeCome" style="height: 30px; width: 30px; object-fit: contain; margin-right: 0.5rem;">
        ComeCome
      </a>
      <button class="btn btn-outline-warning position-relative" type="button" data-bs-toggle="offcanvas" data-bs-target="#carritoOffcanvas">
        <i class="bi bi-cart-fill"></i>
        <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-warning text-dark">0</span>

  <!-- Barra de categorías -->
  <div class="categorias-nav" id="categorias-nav">
    <div class="container" id="categorias-container">
      <span class="skeleton skeleton-chip"></span>

  <!-- Aviso de horario (dinámico) -->
  <div id="horario-aviso" class="alert alert-warning text-center mb-0 d-none" role="alert">

  </div>

  <!-- Contenedor de toasts -->
  <div aria-live="polite" aria-atomic="true" class="toast-container position-fixed bottom-0 start-0 end-0 p-3" style="z-index: 11">
    <div id="toastPedido" class="toast align-items-center border-warning" role="alert" data-bs-delay="5000">

    <div id="productos-container" class="row row-cols-1 row-cols-md-3 g-4">
      <div class="col"><div class="skeleton skeleton-card"></div></div>
      <div class="col"><div class="skeleton skeleton-card"></div></div>
      <div class="col"><div class="skeleton skeleton-card"></div></div>
    </div>

  <!-- Footer -->
  <footer class="footer text-center py-3 mt-5">
    <div class="container">
      <div class="d-flex flex-wrap justify-content-center align-items-center gap-3">
        <small class="text-warning">© 2025 ComeCome</small>
        <a href="tel:+5356553393" class="text-warning text-decoration-none me-2" title="Llamar">
          <i class="bi bi-telephone-fill"></i> 5 6553393
        </a>
        <a href="https://wa.me/5356553393" target="_blank" class="text-warning text-decoration-none me-3" title="WhatsApp">
          <i class="bi bi-whatsapp"></i>
        </a>
        <a href="tel:+5353866494" class="text-warning text-decoration-none me-2" title="Llamar">
          <i class="bi bi-telephone-fill"></i> 5 3866494
        </a>
        <a href="https://wa.me/5353866494" target="_blank" class="text-warning text-decoration-none" title="WhatsApp">

  <!-- Offcanvas carrito -->
  <div class="offcanvas offcanvas-end" tabindex="-1" id="carritoOffcanvas">

    <div class="offcanvas-body">
      <div id="carrito-lista" class="list-group mb-3"></div>

        <label class="form-label fw-bold">Tipo de entrega</label>

          <option value="recoger">Recoger en tienda (GRATIS)</option>

      <!-- Bloque para recoger en tienda (mapa con zoom amplio) -->

          <iframe
            src="https://www.google.com/maps?q=El+ComeCome&z=15&output=embed"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            title="Ubicación de recogida El ComeCome">
          </iframe>

        <div class="recogida-info d-flex justify-content-between align-items-center flex-wrap gap-2">
          <span><i class="bi bi-geo-alt-fill text-warning"></i> El ComeCome, Holguín</span>

  <!-- Modal checkout -->
  <div class="modal fade" id="checkoutModal" tabindex="-1">

      <div class="modal-content">
        <div class="modal-header bg-dark text-warning">
          <h5 class="modal-title"><i class="bi bi-pencil-square"></i> Datos de entrega</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="checkout-error" class="alert alert-danger py-2 error-message" role="alert">
            <i class="bi bi-exclamation-triangle"></i> <span id="error-text"></span>
          </div>

            <div class="mb-3"><label class="form-label">Nombre</label><input type="text" class="form-control" id="nombre" required></div>
            <div class="mb-3"><label class="form-label">Teléfono</label><input type="tel" class="form-control" id="telefono" required></div>
            <div class="mb-3"><label class="form-label">Dirección completa</label><textarea class="form-control" id="direccion" rows="2" required></textarea></div>
            <div class="mb-3"><label class="form-label">Punto de referencia <small class="text-muted">(opcional)</small></label><textarea class="form-control" id="referencia" rows="1" placeholder="Ej: detrás de la gasolinera..."></textarea></div>
            <div class="mb-3"><label class="form-label">Método de pago</label><select class="form-select" id="metodo-pago" required><option value="">Selecciona...</option><option value="transferencia">Transferencia</option><option value="efectivo">Efectivo al entregar</option></select></div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-amarillo" id="confirmar-pedido"><i class="bi bi-check-lg"></i> Confirmar pedido</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    (function() { var noop = function() {}; console.log = noop; console.warn = noop; console.error = noop; console.info = noop; })();

    const SUPABASE_URL = 'https://xjjbrnjgpncxwqishseo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_e68llCL_CYuf2M9TyVcdWA_HdMDYpVF';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ⚠️ CAMBIA ESTO POR TU TOPIC REAL DE NTFY
    const NTFY_TOPIC = 'comecome_8f3js9f83jf93jf';

    let todasCategorias = [];
    let todosProductos = [];
    let hayCombosActivos = false;
    let categoriaActiva = 'todas';
    let carrito = [];
    let checkoutModalInstance = null;
    let horarioAbierto = true;
    let tipoEntrega = 'recoger';

    document.addEventListener('DOMContentLoaded', async () => {
      const modalEl = document.getElementById('checkoutModal');
      if (modalEl) checkoutModalInstance = new bootstrap.Modal(modalEl);

      await cargarCategorias();
      await cargarProductos();
      await verificarCombosActivos();
      await cargarRepartosEnvio();
      renderCategorias();
      await verificarHorario();
      renderProductos();

      setInterval(async () => {
        await verificarHorario();
        if (categoriaActiva === 'combos') {
          cargarCombosPublicos();
        } else {
          renderProductos();
        }
      }, 60000);
    });

    async function cargarCategorias() {
      const { data } = await supabaseClient
        .from('categorias')
        .select('*')
        .order('nombre');
      if (data) todasCategorias = data;
    }

    async function cargarProductos() {
      const { data } = await supabaseClient
        .from('productos')
        .select('*, categorias(nombre)')
        .eq('activo', true)
        .order('nombre');
      if (data) todosProductos = data;
    }

    async function verificarCombosActivos() {
      const { data } = await supabaseClient
        .from('combos')
        .select('id')
        .eq('activo', true)
        .limit(1);
      hayCombosActivos = data && data.length > 0;
    }

    async function cargarRepartosEnvio() {
      const { data } = await supabaseClient
        .from('repartos')
        .select('*')
        .eq('activo', true)
        .order('nombre');
      const select = document.getElementById('reparto-select');
      select.innerHTML = '<option value="">Selecciona tu reparto...</option>';
      if (data) {
        data.forEach(r => {
          const opt = document.createElement('option');
          opt.value = r.id;
          opt.dataset.precio = r.precio;
          opt.textContent = `${r.nombre} (${r.distancia}) +${parseFloat(r.precio).toFixed(2)} CUP`;
          select.appendChild(opt);
        });
      }
    }

    function cambiarTipoEntrega() {
      tipoEntrega = document.getElementById('tipo-entrega').value;
      const bloqueRecoger = document.getElementById('bloque-recoger');
      const bloqueDomicilio = document.getElementById('bloque-domicilio');
      if (tipoEntrega === 'recoger') {
        bloqueRecoger.classList.remove('d-none');
        bloqueDomicilio.classList.add('d-none');
        document.getElementById('reparto-select').value = '';
      } else {
        bloqueRecoger.classList.add('d-none');
        bloqueDomicilio.classList.remove('d-none');
      }
      actualizarCarrito();
    }

    function renderCategorias() {
      const container = document.getElementById('categorias-container');
      let html = `<button class="btn-categoria active" onclick="filtrarPorCategoria('todas', this)">Todas</button>`;

      if (hayCombosActivos) {
        html += `<button class="btn-categoria" onclick="filtrarPorCategoria('combos', this)">Combos</button>`;
      }

      const categoriasConProductos = todasCategorias.filter(cat =>
        todosProductos.some(prod => prod.categoria_id === cat.id)
      );

      categoriasConProductos.forEach(cat => {
        html += `<button class="btn-categoria" onclick="filtrarPorCategoria('${cat.id}', this)">${cat.nombre}</button>`;
      });

      container.innerHTML = html;
    }

    function filtrarPorCategoria(catId, el) {
      categoriaActiva = catId;
      document.querySelectorAll('.btn-categoria').forEach(btn => btn.classList.remove('active'));
      el.classList.add('active');
      if (catId === 'combos') {
        cargarCombosPublicos();
      } else {
        renderProductos();
      }
    }

    function renderProductos() {
      const container = document.getElementById('productos-container');
      let productosFiltrados = todosProductos;
      if (categoriaActiva !== 'todas') {
        productosFiltrados = todosProductos.filter(p => p.categoria_id === categoriaActiva);
      }

      if (productosFiltrados.length === 0) {
        container.innerHTML = '<p class="text-muted">No hay productos en esta categoría.</p>';
        return;
      }

      container.innerHTML = productosFiltrados.map(p => `
        <div class="col">
          <div class="card card-producto h-100">
            <div class="producto-media">
              ${p.foto_url
                ? `<img src="${p.foto_url}" class="card-img-top" alt="${p.nombre}">`
                : `<div class="producto-sin-foto"><i class="bi bi-image"></i></div>`
              }
              <button class="btn-add-flotante" onclick="agregarAlCarrito('${p.id}')" ${horarioAbierto ? '' : 'disabled'} aria-label="Añadir ${p.nombre} al carrito">
                <i class="bi bi-plus-lg"></i>
              </button>
            </div>
            <div class="card-body">
              <h5 class="card-title">${p.nombre}</h5>
              <p class="card-text small text-muted">${p.descripcion || ''}</p>
              <span class="precio-pill">${parseFloat(p.precio).toFixed(2)} CUP</span>
              ${p.permite_extras ? '<div class="mt-2"><small class="text-muted"><i class="bi bi-chat-dots"></i> Puedes añadir extras en el carrito</small></div>' : ''}
            </div>
          </div>
        </div>
      `).join('');
    }

    async function cargarCombosPublicos() {
      const container = document.getElementById('productos-container');
      container.innerHTML = '<div class="col"><div class="skeleton skeleton-card"></div></div><div class="col"><div class="skeleton skeleton-card"></div></div><div class="col"><div class="skeleton skeleton-card"></div></div>';

      const { data: combos, error } = await supabaseClient
        .from('combos')
        .select('*')
        .eq('activo', true)
        .order('nombre');

      if (error || !combos || combos.length === 0) {
        container.innerHTML = '<p class="text-muted">No hay combos disponibles.</p>';
        return;
      }

      let html = '';
      for (const combo of combos) {
        const { data: items } = await supabaseClient
          .from('combo_items')
          .select('*, productos(nombre, precio)')
          .eq('combo_id', combo.id);

        const totalOriginal = (items || []).reduce((s, i) => s + (parseFloat(i.productos.precio) * i.cantidad), 0);
        let precioFinal = totalOriginal;
        if (combo.tipo_descuento === 'porcentaje') {
          precioFinal = totalOriginal * (1 - combo.valor_descuento / 100);
        } else if (combo.tipo_descuento === 'fijo') {
          precioFinal = parseFloat(combo.valor_descuento);
        }

        const listaProductos = (items || []).map(i => `${i.cantidad}x ${i.productos.nombre}`).join(', ');

        html += `
          <div class="col">
            <div class="card card-producto h-100">
              <div class="producto-media">
                <div class="producto-sin-foto"><i class="bi bi-star-fill"></i></div>
                <span class="badge-oferta">${combo.tipo_descuento === 'porcentaje' ? '-' + combo.valor_descuento + '%' : 'Oferta'}</span>
                <button class="btn-add-flotante" onclick="agregarComboAlCarrito('${combo.id}')" ${horarioAbierto ? '' : 'disabled'} aria-label="Añadir combo ${combo.nombre} al carrito">
                  <i class="bi bi-plus-lg"></i>
                </button>
              </div>
              <div class="card-body">
                <h5 class="card-title">${combo.nombre}</h5>
                <p class="card-text small text-muted">${listaProductos}</p>
                <div class="d-flex align-items-center gap-2">
                  <s class="text-muted small">${totalOriginal.toFixed(2)} CUP</s>
                  <span class="precio-pill">${precioFinal.toFixed(2)} CUP</span>
                </div>
              </div>
            </div>
          </div>`;
      }
      container.innerHTML = html;
    }

    async function verificarHorario() {
      const ahora = new Date();
      const diaSemana = ahora.getDay();
      const horaActual = ahora.getHours() + ahora.getMinutes() / 60;

      const { data } = await supabaseClient
        .from('horarios')
        .select('abierto, hora_apertura, hora_cierre')
        .eq('dia_semana', diaSemana)
        .single();

      let textoHorario = 'Cerrado hoy.';

      if (data) {
        if (data.abierto) {
          horarioAbierto = true;
          textoHorario = '';
        } else if (data.hora_apertura && data.hora_cierre && data.hora_apertura !== data.hora_cierre) {
          const [hA, mA] = data.hora_apertura.split(':').map(Number);
          const [hC, mC] = data.hora_cierre.split(':').map(Number);
          const apertura = hA + mA / 60;
          const cierre = hC + mC / 60;
          horarioAbierto = horaActual >= apertura && horaActual < cierre;

          if (!horarioAbierto) {
            textoHorario = `Los pedidos en línea están disponibles de ${data.hora_apertura.slice(0,5)} a ${data.hora_cierre.slice(0,5)}.`;
          }
        } else {
          horarioAbierto = false;
          textoHorario = 'Cerrado hoy.';
        }
      } else {
        horarioAbierto = false;
        textoHorario = 'Cerrado hoy.';
      }

      document.getElementById('horario-aviso').classList.toggle('d-none', horarioAbierto);
      document.getElementById('horario-texto').textContent = textoHorario;
    }

    function agregarAlCarrito(idProducto) {
      const producto = todosProductos.find(p => p.id === idProducto);
      if (!producto) return;
      const grupo = carrito.find(item => item.id === idProducto && !item.esCombo);
      if (grupo) {
        grupo.cantidad++;
      } else {
        carrito.push({
          id: producto.id,
          nombre: producto.nombre,
          precio: parseFloat(producto.precio),
          foto: producto.foto_url,
          permiteExtras: producto.permite_extras,
          cantidad: 1,
          extras: '',
          esCombo: false
        });
      }
      actualizarCarrito();
    }

    async function agregarComboAlCarrito(comboId) {
      const { data: combo } = await supabaseClient
        .from('combos')
        .select('*')
        .eq('id', comboId)
        .single();
      if (!combo) return;

      const { data: items } = await supabaseClient
        .from('combo_items')
        .select('*, productos(nombre, precio)')
        .eq('combo_id', comboId);

      const totalOriginal = (items || []).reduce((s, i) => s + (parseFloat(i.productos.precio) * i.cantidad), 0);
      let precioFinal = totalOriginal;
      if (combo.tipo_descuento === 'porcentaje') {
        precioFinal = totalOriginal * (1 - combo.valor_descuento / 100);
      } else if (combo.tipo_descuento === 'fijo') {
        precioFinal = parseFloat(combo.valor_descuento);
      }

      const comboItem = {
        id: combo.id,
        nombre: combo.nombre,
        precio: precioFinal,
        permiteExtras: false,
        cantidad: 1,
        extras: '',
        esCombo: true
      };

      const grupo = carrito.find(item => item.id === combo.id && item.esCombo);
      if (grupo) {
        grupo.cantidad++;
      } else {
        carrito.push(comboItem);
      }
      actualizarCarrito();
    }

    function cambiarCantidad(index, delta) {
      if (index < 0 || index >= carrito.length) return;
      carrito[index].cantidad += delta;
      if (carrito[index].cantidad <= 0) {
        carrito.splice(index, 1);
      }
      actualizarCarrito();
    }

    function actualizarCarrito() {
      const lista = document.getElementById('carrito-lista');
      const totalSpan = document.getElementById('total-pedido');
      const countBadge = document.getElementById('cart-count');
      const btnCheckout = document.getElementById('btn-checkout');

      lista.innerHTML = carrito.map((item, index) => `
        <div class="list-group-item carrito-item d-flex justify-content-between align-items-start">
          <div class="w-100">
            <div class="d-flex justify-content-between align-items-start">
              <strong>${item.nombre} ${item.esCombo ? '<small class="text-warning">(Combo)</small>' : ''}</strong>
              <span class="fw-bold">${(item.precio * item.cantidad).toFixed(2)} CUP</span>
            </div>
            <div class="d-flex justify-content-between align-items-center mt-2">
              <div class="stepper">
                <button type="button" onclick="cambiarCantidad(${index}, -1)" aria-label="Quitar una unidad"><i class="bi bi-dash"></i></button>
                <span>${item.cantidad}</span>
                <button type="button" onclick="cambiarCantidad(${index}, 1)" aria-label="Añadir una unidad"><i class="bi bi-plus"></i></button>
              </div>
              <button class="btn btn-sm text-danger" onclick="eliminarDelCarrito(${index})" title="Eliminar"><i class="bi bi-trash"></i></button>
            </div>
            ${!item.esCombo && item.permiteExtras ? `<input type="text" class="form-control form-control-sm mt-2" placeholder="Extras (ej: sin cebolla)" value="${item.extras}" oninput="actualizarExtras(${index}, this.value)">` : ''}
          </div>
        </div>
      `).join('') || `<div class="carrito-vacio"><i class="bi bi-basket"></i><p class="mt-2 mb-0 fw-semibold">Tu carrito está vacío</p><small>Añade algo rico de la carta 🍔</small></div>`;

      const subtotal = carrito.reduce((sum, item) => sum + (item.precio * item.cantidad), 0);
      let envio = 0;
      if (tipoEntrega === 'domicilio') {
        const repartoSelect = document.getElementById('reparto-select');
        if (repartoSelect && repartoSelect.selectedOptions[0]?.dataset.precio) {
          envio = parseFloat(repartoSelect.selectedOptions[0].dataset.precio);
        }
      }
      const total = subtotal + envio;
      totalSpan.textContent = total.toFixed(2) + ' CUP';

      const nuevoConteo = carrito.reduce((sum, item) => sum + item.cantidad, 0);
      if (countBadge.textContent !== String(nuevoConteo)) {
        countBadge.classList.remove('bump');
        void countBadge.offsetWidth;
        countBadge.classList.add('bump');
      }
      countBadge.textContent = nuevoConteo;

      // Habilitar botón si hay productos y, en caso de domicilio, hay reparto seleccionado
      const repartoOk = tipoEntrega === 'recoger' || (tipoEntrega === 'domicilio' && document.getElementById('reparto-select')?.value);
      btnCheckout.disabled = carrito.length === 0 || !repartoOk;
    }

    function actualizarExtras(index, valor) {
      if (index >= 0 && index < carrito.length) carrito[index].extras = valor;
    }

    function eliminarDelCarrito(index) {
      carrito.splice(index, 1);
      actualizarCarrito();
    }

    document.getElementById('btn-checkout').addEventListener('click', () => {
      if (carrito.length === 0) return;
      checkoutModalInstance.show();
    });

    document.getElementById('confirmar-pedido').addEventListener('click', async () => {
      const nombre = document.getElementById('nombre').value.trim();
      const telefono = document.getElementById('telefono').value.trim();
      const direccion = document.getElementById('direccion').value.trim();
      const referencia = document.getElementById('referencia').value.trim();
      const metodo = document.getElementById('metodo-pago').value;

      const errorDiv = document.getElementById('checkout-error');
      const errorText = document.getElementById('error-text');
      if (!nombre || !telefono || !direccion || !metodo) {
        errorText.textContent = 'Completa los campos obligatorios.';
        errorDiv.style.display = 'block';
        return;
      }
      errorDiv.style.display = 'none';

      let zonaTexto = 'Recoger en tienda';
      if (tipoEntrega === 'domicilio') {
        const repartoSelect = document.getElementById('reparto-select');
        const opcion = repartoSelect.options[repartoSelect.selectedIndex];
        zonaTexto = opcion && opcion.value ? opcion.textContent : 'Domicilio';
      }

      const totalPedido = parseFloat(document.getElementById('total-pedido').textContent);

      const { error: errorPedido } = await supabaseClient
        .from('pedidos')
        .insert([{
          nombre,
          telefono,
          direccion,
          referencia: referencia || null,
          metodo_pago: metodo,
          zona: zonaTexto,
          total: totalPedido,
          items: carrito.map(item => ({
            nombre: item.nombre,
            precio: item.precio,
            cantidad: item.cantidad,
            extras: item.extras || null,
            esCombo: item.esCombo || false
          })),
          estado: 'pendiente'
        }]);

      if (errorPedido) {
        errorText.textContent = 'Error al enviar el pedido.';
        errorDiv.style.display = 'block';
        return;
      }

      // ─── ENVIAR NOTIFICACIÓN NTFY CON TODA LA INFORMACIÓN ───
      const productosTexto = carrito.map(item => {
        const extra = item.extras ? ` (${item.extras})` : '';
        return `${item.cantidad}x ${item.nombre}${extra} — ${(item.precio * item.cantidad).toFixed(2)} CUP`;
      }).join('\n');

      const mensajeNtfy = 
`🍔 NUEVO PEDIDO — ComeCome
👤 ${nombre}
📞 ${telefono}
📍 ${direccion}${referencia ? '\n📌 Ref: ' + referencia : ''}
🛵 Entrega: ${zonaTexto}
💳 Pago: ${metodo}
────────────────
${productosTexto}
────────────────
💰 TOTAL: ${totalPedido.toFixed(2)} CUP`;

      fetch(`https://ntfy.sh/${NTFY_TOPIC}`, {
        method: 'POST',
        body: mensajeNtfy
      }).catch(() => {});

      // ─── FIN NOTIFICACIÓN ───

      checkoutModalInstance.hide();
      const offcanvas = bootstrap.Offcanvas.getInstance(document.getElementById('carritoOffcanvas'));
      if (offcanvas) offcanvas.hide();
      document.getElementById('confirmar-pedido').blur();

      setTimeout(() => {
        const toast = new bootstrap.Toast(document.getElementById('toastPedido'));
        toast.show();
      }, 300);

      carrito = [];
      actualizarCarrito();
    });
  </script>
</body>
