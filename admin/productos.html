<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComeCome - Productos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    :root {
      --amarillo: #FCE029;
      --amarillo-hover: #e6c800;
      --negro: #000;
      --blanco: #fff;
    }
    body { background-color: var(--negro); color: var(--blanco); font-family: 'Segoe UI', sans-serif; }
    .navbar-admin { background-color: #111; border-bottom: 2px solid var(--amarillo); }
    .navbar-brand { color: var(--amarillo) !important; font-weight: bold; }
    .btn-amarillo {
      background-color: var(--amarillo); color: var(--negro);
      border: none; font-weight: bold; padding: 0.3rem 0.8rem; font-size: 0.85rem;
    }
    .btn-amarillo:hover { background-color: var(--amarillo-hover); }
    .btn-outline-amarillo {
      color: var(--amarillo); border: 1px solid var(--amarillo);
      background: transparent; padding: 0.3rem 0.8rem; font-size: 0.85rem;
    }
    .btn-outline-amarillo:hover { background-color: var(--amarillo); color: var(--negro); }

    /* Tarjeta de producto */
    .producto-item {
      background-color: #111;
      border: 2px solid var(--amarillo);
      border-radius: 0.5rem;
      padding: 0.8rem;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: transform 0.1s;
    }
    .producto-item:hover { transform: scale(1.01); }
    .producto-info {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-grow: 1;
      overflow: hidden;
    }
    .producto-foto {
      width: 50px; height: 50px;
      object-fit: cover;
      border-radius: 0.3rem;
      flex-shrink: 0;
    }
    .producto-detalles {
      overflow: hidden;
    }
    .producto-nombre {
      font-weight: bold;
      font-size: 1rem;
      text-transform: uppercase;
      color: var(--blanco);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .producto-meta {
      font-size: 0.8rem;
      color: var(--amarillo);
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .producto-acciones {
      display: flex;
      gap: 0.3rem;
      flex-shrink: 0;
    }

    .modal-content { background-color: #111; border: 2px solid var(--amarillo); color: var(--blanco); }
    .modal-header, .modal-footer { border-color: var(--amarillo); }
    .form-control, .form-select {
      background-color: #000; color: var(--blanco); border: 1px solid var(--amarillo);
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--amarillo); box-shadow: 0 0 0 0.2rem rgba(252, 224, 41, 0.25);
    }
    .form-check-input:checked {
      background-color: var(--amarillo);
      border-color: var(--amarillo);
    }

    /* Responsive */
    @media (max-width: 500px) {
      .producto-item { flex-wrap: wrap; }
      .producto-acciones { width: 100%; justify-content: flex-end; margin-top: 0.5rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark navbar-admin">
    <div class="container">
      <span class="navbar-brand"><i class="bi bi-circle-fill" style="color: var(--amarillo);"></i> ComeCome Admin</span>
      <div>
        <a href="index.html" class="btn btn-outline-amarillo btn-sm me-2"><i class="bi bi-house"></i> Menú</a>
        <button class="btn btn-outline-amarillo btn-sm" onclick="cerrarSesion()"><i class="bi bi-box-arrow-right"></i> Salir</button>
      </div>
    </div>
  </nav>

  <main class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="text-warning mb-0"><i class="bi bi-box-fill"></i> Productos</h2>
      <button class="btn btn-amarillo btn-sm" onclick="abrirModalNuevo()">
        <i class="bi bi-plus-lg"></i> Nuevo
      </button>
    </div>

    <div id="productos-container">
      <!-- lista de tarjetas dinámica -->
    </div>
  </main>

  <!-- Modal producto -->
  <div class="modal fade" id="productoModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modal-titulo"><i class="bi bi-box"></i> Nuevo producto</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="producto-form">
            <input type="hidden" id="prod-id">
            <div class="mb-3">
              <label class="form-label">Nombre</label>
              <input type="text" class="form-control form-control-sm" id="prod-nombre" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Descripción / Ingredientes</label>
              <textarea class="form-control form-control-sm" id="prod-descripcion" rows="2"></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label">Precio (CUP)</label>
              <input type="number" step="0.01" min="0" class="form-control form-control-sm" id="prod-precio" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Categoría</label>
              <select class="form-select form-select-sm" id="prod-categoria">
                <option value="">Sin categoría</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Foto</label>
              <input type="file" class="form-control form-control-sm" id="prod-foto" accept="image/*">
              <img id="preview-foto" src="" class="mt-2 d-none" style="width:100px;height:100px;object-fit:cover;border-radius:0.3rem;">
            </div>
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" id="prod-extras" checked>
              <label class="form-check-label" for="prod-extras">Permitir extras</label>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-amarillo btn-sm" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-amarillo btn-sm" id="btn-guardar"><i class="bi bi-check-lg"></i> Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="comun.js"></script>
  <script src="productos.js"></script>
</body>
</html>
