<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComeCome - Acceso administrador</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    :root {
      --amarillo: #FCE029;
      --negro: #000;
    }
    body {
      background-color: var(--negro);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem; /* evita que la tarjeta toque los bordes en móviles */
    }
    .login-card {
      background-color: #111;
      border: 2px solid var(--amarillo);
      border-radius: 1rem;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      /* centrado asegurado por el body flex */
    }
    .btn-amarillo {
      background-color: var(--amarillo);
      color: var(--negro);
      border: none;
      font-weight: bold;
    }
    .btn-amarillo:hover {
      background-color: #e6c800;
    }
    .form-control:focus {
      border-color: var(--amarillo);
      box-shadow: 0 0 0 0.2rem rgba(252, 224, 41, 0.25);
    }
  </style>
</head>
<body>
  <div class="login-card text-white">
    <h3 class="text-center mb-3">
      <i class="bi bi-circle-fill" style="color: var(--amarillo);"></i> ComeCome
    </h3>
    <p class="text-center text-warning mb-4">Panel de administración</p>

    <div id="login-error" class="alert alert-danger py-2 d-none" role="alert">
      <span id="error-text"></span>
    </div>

    <form id="login-form">
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" id="email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="password" required>
      </div>
      <button type="submit" class="btn btn-amarillo w-100">
        <i class="bi bi-box-arrow-in-right"></i> Entrar
      </button>
    </form>
  </div>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const SUPABASE_URL = 'https://xjjbrnjgpncxwqishseo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_e68llCL_CYuf2M9TyVcdWA_HdMDYpVF';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('login-error');
      const errorText = document.getElementById('error-text');

      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        errorText.textContent = 'Error: ' + error.message;
        errorDiv.classList.remove('d-none');
      } else {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
