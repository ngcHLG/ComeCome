<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComeCome - Categorías</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    :root {
      --amarillo: #FCE029;
      --amarillo-hover: #e6c800;
      --negro: #000;
      --blanco: #fff;
    }
    body {
      background-color: var(--negro);
      color: var(--blanco);
      font-family: 'Segoe UI', sans-serif;
    }
    .navbar-admin {
      background-color: #111;
      border-bottom: 2px solid var(--amarillo);
    }
    .navbar-brand {
      color: var(--amarillo) !important;
      font-weight: bold;
    }
    .btn-amarillo {
      background-color: var(--amarillo);
      color: var(--negro);
      border: none;
      font-weight: bold;
      padding: 0.3rem 0.8rem;
      font-size: 0.85rem;
    }
    .btn-amarillo:hover {
      background-color: var(--amarillo-hover);
    }
    .btn-outline-amarillo {
      color: var(--amarillo);
      border: 1px solid var(--amarillo);
      background: transparent;
      padding: 0.3rem 0.8rem;
      font-size: 0.85rem;
    }
    .btn-outline-amarillo:hover {
      background-color: var(--amarillo);
      color: var(--negro);
    }

    /* Tarjeta de categoría */
    .categoria-item {
      background-color: #111;
      border: 2px solid var(--amarillo);
      border-radius: 0.5rem;
      padding: 0.8rem 1rem;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: transform 0.1s;
    }
    .categoria-item:hover {
      transform: scale(1.01);
    }
    .categoria-nombre {
      font-weight: bold;
      font-size: 1.1rem;
      text-transform: uppercase;
      color: var(--blanco);
      flex-grow: 1;
      /* Truncar texto largo */
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      margin-right: 0.5rem;
    }
    .categoria-acciones {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .modal-content {
      background-color: #111;
      border: 2px solid var(--amarillo);
      color: var(--blanco);
    }
    .modal-header, .modal-footer {
      border-color: var(--amarillo);
    }
    .form-control {
      background-color: #000;
      color: var(--blanco);
      border: 1px solid var(--amarillo);
    }
    .form-control:focus {
      border-color: var(--amarillo);
      box-shadow: 0 0 0 0.2rem rgba(252, 224, 41, 0.25);
    }

    /* Ajuste extra para pantallas muy pequeñas */
    @media (max-width: 400px) {
      .categoria-nombre {
        font-size: 0.9rem;
      }
      .categoria-acciones .btn {
        padding: 0.2rem 0.4rem;
        font-size: 0.7rem;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark navbar-admin">
    <div class="container">
      <span class="navbar-brand"><i class="bi bi-circle-fill" style="color: var(--amarillo);"></i> ComeCome Admin</span>
      <div>
        <a href="index.html" class="btn btn-outline-amarillo btn-sm me-2"><i class="bi bi-house"></i> Menú</a>
        <button class="btn btn-outline-amarillo btn-sm" onclick="cerrarSesion()"><i class="bi bi-box-arrow-right"></i> Salir</button>
      </div>
    </div>
  </nav>

  <main class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="text-warning mb-0"><i class="bi bi-tags-fill"></i> Categorías</h2>
      <button class="btn btn-amarillo btn-sm" onclick="abrirModalNuevo()">
        <i class="bi bi-plus-lg"></i> Nueva
      </button>
    </div>

    <div id="categorias-container">
      <!-- lista dinámica -->
    </div>
  </main>

  <!-- Modal solo con nombre -->
  <div class="modal fade" id="categoriaModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modal-titulo"><i class="bi bi-tag"></i> Nueva categoría</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="categoria-form">
            <input type="hidden" id="cat-id">
            <div class="mb-3">
              <label class="form-label">Nombre</label>
              <input type="text" class="form-control form-control-sm" id="cat-nombre" required>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-amarillo btn-sm" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-amarillo btn-sm" id="btn-guardar"><i class="bi bi-check-lg"></i> Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="comun.js"></script>
  <script src="categorias.js"></script>
</body>
</html>
