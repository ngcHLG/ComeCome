<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComeCome - Horarios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    :root {
      --amarillo: #FCE029;
      --amarillo-hover: #e6c800;
      --negro: #000;
      --blanco: #fff;
    }
    body { background-color: var(--negro); color: var(--blanco); font-family: 'Segoe UI', sans-serif; }
    .navbar-admin { background-color: #111; border-bottom: 2px solid var(--amarillo); }
    .navbar-brand { color: var(--amarillo) !important; font-weight: bold; }
    .btn-amarillo {
      background-color: var(--amarillo); color: var(--negro);
      border: none; font-weight: bold; padding: 0.3rem 0.8rem; font-size: 0.85rem;
    }
    .btn-amarillo:hover { background-color: var(--amarillo-hover); }
    .btn-outline-amarillo {
      color: var(--amarillo); border: 1px solid var(--amarillo);
      background: transparent; padding: 0.3rem 0.8rem; font-size: 0.85rem;
    }
    .btn-outline-amarillo:hover { background-color: var(--amarillo); color: var(--negro); }

    .horario-item {
      background-color: #111;
      border: 2px solid var(--amarillo);
      border-radius: 0.5rem;
      padding: 0.8rem 1rem;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: transform 0.1s;
      flex-wrap: wrap;           /* Permite que los elementos pasen a la siguiente línea si no caben */
      gap: 0.5rem;
    }
    .horario-item:hover { transform: scale(1.01); }
    .horario-info {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-grow: 1;
      flex-wrap: wrap;           /* Se adapta en pantallas muy pequeñas */
      min-width: 0;              /* Permite truncar texto */
    }
    .horario-dia {
      font-weight: bold;
      font-size: 1rem;
      text-transform: uppercase;
      color: var(--blanco);
      white-space: nowrap;       /* Evita que el día se parta */
    }
    .horario-horas {
      font-size: 0.9rem;
      color: var(--amarillo);
      white-space: nowrap;
    }
    .horario-estado-manual {
      font-size: 0.85rem;
      white-space: nowrap;
    }
    .horario-automatico {
      font-size: 0.8rem;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }
    .horario-acciones {
      display: flex;
      gap: 0.3rem;
      flex-shrink: 0;
    }

    .modal-content { background-color: #111; border: 2px solid var(--amarillo); color: var(--blanco); }
    .modal-header, .modal-footer { border-color: var(--amarillo); }
    .form-control, .form-select {
      background-color: #000; color: var(--blanco); border: 1px solid var(--amarillo);
    }
    .form-control:focus { border-color: var(--amarillo); box-shadow: 0 0 0 0.2rem rgba(252, 224, 41, 0.25); }
    .form-check-input:checked {
      background-color: var(--amarillo); border-color: var(--amarillo);
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark navbar-admin">
    <div class="container">
      <span class="navbar-brand"><i class="bi bi-circle-fill" style="color: var(--amarillo);"></i> ComeCome Admin</span>
      <div>
        <a href="index.html" class="btn btn-outline-amarillo btn-sm me-2"><i class="bi bi-house"></i> Menú</a>
        <button class="btn btn-outline-amarillo btn-sm" onclick="cerrarSesion()"><i class="bi bi-box-arrow-right"></i> Salir</button>
      </div>
    </div>
  </nav>

  <main class="container my-4">
    <h2 class="text-warning mb-3"><i class="bi bi-clock-fill"></i> Horarios</h2>
    <div id="horarios-container"></div>
  </main>

  <!-- Modal editar horario -->
  <div class="modal fade" id="horarioModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modal-titulo"><i class="bi bi-pencil"></i> Editar horario</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="horario-form">
            <input type="hidden" id="horario-id">
            <div class="mb-3">
              <label class="form-label">Día</label>
              <input type="text" class="form-control form-control-sm" id="horario-dia" readonly>
            </div>
            <div class="form-check form-switch mb-3">
              <input class="form-check-input" type="checkbox" id="horario-abierto">
              <label class="form-check-label" for="horario-abierto">Forzar abierto (ignorar horas)</label>
            </div>
            <div class="row">
              <div class="col">
                <label class="form-label">Apertura</label>
                <input type="time" class="form-control form-control-sm" id="horario-apertura">
              </div>
              <div class="col">
                <label class="form-label">Cierre</label>
                <input type="time" class="form-control form-control-sm" id="horario-cierre">
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-amarillo btn-sm" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-amarillo btn-sm" id="btn-guardar"><i class="bi bi-check-lg"></i> Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="comun.js"></script>
  <script src="horarios.js"></script>
</body>
</html>
