<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComeCome - Pedidos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    :root {
      --amarillo: #FCE029;
      --amarillo-hover: #e6c800;
      --negro: #000;
      --blanco: #fff;
    }
    body { background-color: var(--negro); color: var(--blanco); font-family: 'Segoe UI', sans-serif; }
    .navbar-admin { background-color: #111; border-bottom: 2px solid var(--amarillo); }
    .navbar-brand { color: var(--amarillo) !important; font-weight: bold; }
    .btn-amarillo {
      background-color: var(--amarillo); color: var(--negro);
      border: none; font-weight: bold; padding: 0.3rem 0.8rem; font-size: 0.85rem;
    }
    .btn-amarillo:hover { background-color: var(--amarillo-hover); }
    .btn-outline-amarillo {
      color: var(--amarillo); border: 1px solid var(--amarillo);
      background: transparent; padding: 0.3rem 0.8rem; font-size: 0.85rem;
    }
    .btn-outline-amarillo:hover { background-color: var(--amarillo); color: var(--negro); }
    .btn-outline-danger {
      color: #dc3545; border: 1px solid #dc3545;
      background: transparent; padding: 0.3rem 0.8rem; font-size: 0.85rem;
    }
    .btn-outline-danger:hover { background-color: #dc3545; color: var(--blanco); }

    .pedido-item {
      background-color: #111;
      border: 2px solid var(--amarillo);
      border-radius: 0.5rem;
      padding: 0.8rem 1rem;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
    }
    .pedido-contenido { flex-grow: 1; min-width: 0; }
    .pedido-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .pedido-cliente {
      font-weight: bold;
      text-transform: uppercase;
      font-size: 1.1rem;
      color: var(--amarillo);
    }
    .pedido-hora { font-size: 0.8rem; color: var(--blanco); opacity: 0.7; }
    .pedido-detalles {
      font-size: 0.9rem; margin-bottom: 0.5rem;
      display: flex; flex-wrap: wrap; gap: 0.5rem 1rem;
    }
    .pedido-items {
      background-color: #000; border: 1px solid var(--amarillo);
      border-radius: 0.3rem; padding: 0.5rem; margin-bottom: 0.5rem; font-size: 0.85rem;
    }
    .pedido-item-producto {
      display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.3rem;
    }
    .pedido-footer {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 0.5rem;
    }
    .pedido-total { font-weight: bold; font-size: 1.2rem; color: var(--amarillo); }
    .estado-badge { font-size: 0.85rem; font-weight: bold; text-transform: uppercase; }
    .estado-pendiente { color: var(--amarillo); }
    .estado-confirmado { color: #0d6efd; }
    .estado-preparado { color: #fd7e14; }
    .estado-entregado { color: #198754; }

    /* Botón de selección sin marco */
    .btn-seleccion {
      background: transparent;
      border: none;
      color: var(--amarillo);
      padding: 0.1rem;
      font-size: 1.2rem;
      line-height: 1;
      cursor: pointer;
      transition: opacity 0.2s;
      flex-shrink: 0;
      margin-top: 0.1rem;
    }
    .btn-seleccion:hover {
      opacity: 0.8;
    }
    .btn-seleccion.activo {
      color: var(--amarillo);
    }

    /* Barra de herramientas */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .btn-seleccion-todos {
      background: transparent;
      border: 2px solid var(--amarillo);
      color: var(--amarillo);
      border-radius: 0.3rem;
      padding: 0.3rem 0.8rem;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.2s;
    }
    .btn-seleccion-todos.activo {
      background-color: var(--amarillo);
      color: var(--negro);
    }

    @media (max-width: 400px) {
      .btn-seleccion-todos, .btn-outline-danger {
        font-size: 0.75rem;
        padding: 0.25rem 0.6rem;
      }
      .pedido-cliente { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark navbar-admin">
    <div class="container">
      <span class="navbar-brand"><i class="bi bi-circle-fill" style="color: var(--amarillo);"></i> ComeCome Admin</span>
      <div>
        <a href="index.html" class="btn btn-outline-amarillo btn-sm me-2"><i class="bi bi-house"></i> Menú</a>
        <button class="btn btn-outline-amarillo btn-sm" onclick="cerrarSesion()"><i class="bi bi-box-arrow-right"></i> Salir</button>
      </div>
    </div>
  </nav>

  <main class="container my-4">
    <h2 class="text-warning mb-3"><i class="bi bi-receipt"></i> Pedidos</h2>

    <div class="toolbar">
      <button class="btn-seleccion-todos" id="btn-seleccionar-todos" onclick="toggleSeleccionarTodos()">
        <i class="bi bi-check-square"></i> <span>Seleccionar todos</span>
      </button>
      <button id="btn-eliminar-seleccionados" class="btn btn-outline-danger btn-sm d-none" onclick="eliminarSeleccionados()">
        <i class="bi bi-trash"></i> Eliminar (<span id="cantidad-seleccionados">0</span>)
      </button>
    </div>

    <div id="pedidos-container"></div>
  </main>

  <!-- Modal de confirmación para eliminar -->
  <div class="modal fade" id="confirmarEliminarModal" tabindex="-1">
    <div class="modal-dialog modal-sm modal-dialog-centered">
      <div class="modal-content" style="background-color:#111; border:2px solid #FCE029; color:#fff;">
        <div class="modal-header" style="border-bottom:1px solid #FCE029;">
          <h5 class="modal-title text-warning"><i class="bi bi-exclamation-triangle"></i> Confirmar</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-center">
          <p id="confirmar-mensaje">¿Eliminar los pedidos seleccionados?</p>
        </div>
        <div class="modal-footer" style="border-top:1px solid #FCE029;">
          <button type="button" class="btn btn-outline-amarillo btn-sm" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-outline-danger btn-sm" id="btn-confirmar-eliminar">Eliminar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="comun.js"></script>
  <script src="pedidos.js"></script>
</body>
</html>
