<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComeCome - Panel de administración</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    :root {
      --amarillo: #FCE029;
      --negro: #000;
      --blanco: #fff;
    }
    body { background-color: var(--negro); color: var(--blanco); font-family: 'Segoe UI', sans-serif; }
    .navbar-admin { background-color: #111; border-bottom: 2px solid var(--amarillo); }
    .navbar-brand { color: var(--amarillo) !important; font-weight: bold; }
    .btn-salir {
      color: var(--blanco);
      border: 1px solid var(--blanco);
    }
    .btn-salir:hover {
      background-color: var(--blanco);
      color: var(--negro);
    }

    /* Estilo base para todos los botones del menú */
    .menu-item {
      background-color: #111;
      border: 2px solid var(--amarillo);
      border-radius: 1rem;
      color: var(--amarillo);
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 1.5rem 1rem;
      transition: transform 0.2s, background-color 0.2s;
    }
    .menu-item:hover {
      transform: scale(1.05);
      background-color: var(--amarillo);
      color: var(--negro);
    }
    .menu-item i {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
    .menu-item span {
      font-size: 1rem;
      font-weight: bold;
    }

    /* Para pantallas estrechas (móviles): una columna, ícono al lado del texto */
    @media (max-width: 575px) {
      .menu-item {
        flex-direction: row;
        justify-content: flex-start;
        padding: 0.8rem 1.2rem;
      }
      .menu-item i {
        font-size: 1.8rem;
        margin-bottom: 0;
        margin-right: 1rem;
      }
      .menu-item span {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar del admin -->
  <nav class="navbar navbar-dark navbar-admin">
    <div class="container">
      <span class="navbar-brand"><i class="bi bi-circle-fill" style="color: var(--amarillo);"></i> ComeCome Admin</span>
      <button class="btn btn-salir btn-sm" onclick="cerrarSesion()">
        <i class="bi bi-box-arrow-right"></i> Salir
      </button>
    </div>
  </nav>

  <!-- Contenido -->
  <main class="container my-5">
    <h2 class="mb-4 text-warning"><i class="bi bi-speedometer2"></i> Panel de control</h2>
    <!-- En móvil: 1 columna. En tablet: 2. En escritorio: 3 -->
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
      <div class="col">
        <a href="categorias.html" class="menu-item">
          <i class="bi bi-tags-fill"></i>
          <span>Categorías</span>
        </a>
      </div>
      <div class="col">
        <a href="productos.html" class="menu-item">
          <i class="bi bi-box-fill"></i>
          <span>Productos</span>
        </a>
      </div>
      <div class="col">
        <a href="combos.html" class="menu-item">
          <i class="bi bi-star-fill"></i>
          <span>Combos</span>
        </a>
      </div>
      <div class="col">
        <a href="horarios.html" class="menu-item">
          <i class="bi bi-clock-fill"></i>
          <span>Horarios</span>
        </a>
      </div>
      <div class="col">
        <a href="zonas.html" class="menu-item">
          <i class="bi bi-map-fill"></i>
          <span>Zonas</span>
        </a>
      </div>
      <div class="col">
        <a href="pedidos.html" class="menu-item">
          <i class="bi bi-receipt"></i>
          <span>Pedidos</span>
        </a>
      </div>
      <div class="col">
        <a href="config.html" class="menu-item">
          <i class="bi bi-gear-fill"></i>
          <span>Ajustes</span>
        </a>
      </div>
    </div>
  </main>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Común -->
  <script src="comun.js"></script>
</body>
</html>
